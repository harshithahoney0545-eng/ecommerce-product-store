{% extends 'base.html' %}

{% block content %}

<h2>Your Wishlist ❤️</h2>

<div class="products">

{% for item in items %}

<div class="card">
    <img src="{{ item.product.image.url }}">

    <h3>{{ item.product.name }}</h3>

    <p>₹{{ item.product.price }}</p>
</div>

{% empty %}

<p>No items in wishlist</p>

{% endfor %}

</div>

{% endblock %}
