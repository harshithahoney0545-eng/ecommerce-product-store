{% extends 'base.html' %}

{% block content %}

<h2>🛒 My Cart</h2>

<table class="table">
    <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Qty</th>
    </tr>

    {% for item in items %}
    <tr>
        <td>{{ item.product.name }}</td>
        <td>₹{{ item.product.price }}</td>
        <td>{{ item.quantity }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
