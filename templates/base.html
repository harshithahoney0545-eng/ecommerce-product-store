<!DOCTYPE html>
<html>
<head>
    <title>Shoppy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
             background: #ffffff;
        }

        .header{
            background:linear-gradient(90deg,#ff7e5f,#feb47b);
            color:rgb(255, 255, 255);
            text-align:center;
            padding:20px;
        }

        .navbar{
            background:#34495e;
        }

        .navbar a{
            color:rgb(255, 255, 255) !important;
            margin-right:10px;
        }

        .navbar a:hover{
            color:#f1c40f !important;
        }

        .card{
            border-radius:12px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            transition:0.3s;
            overflow:hidden;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .card-img-top{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .product-grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
            gap:20px;
        }
    </style>
</head>

<body>

<div class="header">
    <h3>🛒 Shoppy</h3>
    <small>Shop Smart • Shop Easy • Shop Online</small>
</div>

<div class="container mt-3">
    <form method="GET" action="{% url 'search' %}" class="d-flex">
        <input
            class="form-control me-2"
            type="search"
            name="q"
            placeholder="Search products..."
        >
        <button class="btn btn-warning">Search</button>
    </form>
</div>

<nav class="navbar mt-3">
    <div class="container py-2">
        <a href="{% url 'home' %}" class="btn btn-outline-light btn-sm">Home</a>
        <a href="{% url 'product_list' %}" class="btn btn-outline-light btn-sm">Products</a>
        <a href="{% url 'cart' %}" class="btn btn-outline-light btn-sm">Cart</a>
        <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Login</a>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
