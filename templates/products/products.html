{% extends 'base.html' %}

{% block content %}

<h2>Products</h2>

<div class="row">
{% for product in products %}
    <div class="col-md-3">
        <h4>{{ product.name }}</h4>
        <p>₹{{ product.price }}</p>

        {% if product.image %}
            <img src="{{ product.image.url }}" width="150">
        {% endif %}
    </div>
{% endfor %}
</div>

{% endblock %}
